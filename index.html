<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accurate GPS Location Capture</title>
<style>
body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px}
button{padding:12px 20px;font-size:16px;cursor:pointer}
.card{background:#f5f5f5;padding:15px;border-radius:8px;margin-top:20px}
</style>
</head>
<body>
<h2>Accurate GPS Coordinate Capture</h2>
<p>Click the button and allow location access.</p>
<button onclick="getLocation()">Get Current GPS Location</button>

<div class="card" id="result">Waiting for location...</div>

<script>
function getLocation() {
  const result = document.getElementById('result');

  if (!navigator.geolocation) {
    result.innerHTML = "Geolocation is not supported by this browser.";
    return;
  }

  result.innerHTML = "Fetching GPS location...";

  navigator.geolocation.getCurrentPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const acc = position.coords.accuracy;

      result.innerHTML = `
        <b>Latitude:</b> ${lat}<br>
        <b>Longitude:</b> ${lng}<br>
        <b>Accuracy:</b> ${acc} meters<br><br>
        <a href="https://maps.google.com/?q=${lat},${lng}" target="_blank">
          View on Google Maps
        </a>
      `;
    },
    function(error) {
      result.innerHTML = "Error: " + error.message;
    },
    {
      enableHighAccuracy: true,
      timeout: 20000,
      maximumAge: 0
    }
  );
}
</script>
</body>
</html>
